---
layout: default
lang: en
title: "404 – Not Found"
permalink: /404.html
no_lang_redirect: true
---
{% assign en = site.data.i18n.en %}
{% assign pl = site.data.i18n.pl %}
<style>
  .error-page {
    text-align: center;
    padding: 60px 20px;
    color: #fff;
  }
  .error-page h1 {
    font-size: 6em;
    font-weight: 700;
    margin: 0;
  }
  .error-page h2 {
    font-weight: 400;
    margin: 10px 0 30px;
  }
  .error-page a {
    color: #fff;
    text-decoration: underline;
  }
  .error-page .error-pl {
    margin-top: 30px;
    opacity: 0.7;
  }
</style>
<div class="error-page">
  <h1>404</h1>
  <h2>{{ en.error_title }}</h2>
  <p>{{ en.error_body }}<br>
    <a href="{{ '/' | relative_url }}">{{ en.error_home }}</a>
  </p>
  <p class="error-pl">{{ pl.error_body }}<br>
    <a href="{{ '/pl/' | relative_url }}">{{ pl.error_home }}</a>
  </p>
</div>
