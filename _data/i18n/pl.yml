og_locale: pl_PL
description: Baza główna White Ravens

user_description: >-
  Witaj na stronie głównej WR! Tworzymy dynamiczną społeczność graczy oraz
  oferujemy innowacyjne usługi sieciowe. Wierzymy w ideę wolnego oprogramowania
  i zdecentralizowanego internetu, który stawia na prywatność i niezależność
  użytkowników. Dołącz do nas, odkryj naszą społeczność i współtwórz przyszłość
  cyfrowego świata!

about_title: O Nas

community_title: Społeczność
community_body: >-
  Tworzymy kameralną, ale dynamiczną społeczność graczy i pasjonatów technologii.
  Jeśli cenisz dobrą atmosferę, wolność w sieci i ciekawe dyskusje, dołącz do nas
  na Discordzie i stań się częścią naszej ekipy!

software_title: Software
software_body: >-
  Korzystamy wyłącznie z otwartego oprogramowania, a nasze usługi projektujemy z
  myślą o budowaniu lepszego internetu – bezpiecznego, prywatnego i wolnego od
  zbędnych ograniczeń.

gameservers_title: Serwery gier
gameservers_body: >-
  Dysponujemy niewielką, lecz niezależną siecią serwerów gier, działającą na
  naszej prywatnej infrastrukturze. To idealne miejsce do wspólnej zabawy w
  gronie znajomych, bez kompromisów w kwestii jakości i prywatności!

