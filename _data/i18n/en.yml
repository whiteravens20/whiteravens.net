description: White Ravens home base

user_description: >-
  White Ravens is a small collective building an open and independent corner of
  the internet. We run our own self-hosted services, share what we learn on our
  blog, and stand for free software and a decentralised web that respects
  privacy.

about_title: About Us

community_title: Community
community_body: >-
  We are a community of gamers, tech tinkerers, and open-source enthusiasts. We
  believe in a free and open internet, value good conversations, and enjoy
  learning from one another.

software_title: Software
software_body: >-
  We build and self-host our own services on open-source software —
  privacy-respecting, free of needless restrictions, and openly documented for
  anyone to use or run themselves.

gameservers_title: Game Servers
gameservers_body: >-
  We run a small but independent network of game servers on our own private
  infrastructure. It is the perfect place to play together with friends, with no
  compromises on quality or privacy!

