name: Sync Upstream

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: upstream-sync
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/murraco/jekyll-theme-minimal-resume.git
          git fetch upstream master

      - name: Check for new upstream changes
        id: check
        run: |
          UPSTREAM_HEAD=$(git rev-parse upstream/master)
          LOCAL_HEAD=$(git rev-parse HEAD)
          if [ "$UPSTREAM_HEAD" = "$LOCAL_HEAD" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream changes."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            CHANGES=$(git log --oneline HEAD..upstream/master)
            echo "New upstream commits:"
            echo "$CHANGES"
            {
              echo 'changelog<<EOF'
              echo "$CHANGES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into upstream-sync
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git merge upstream/master --no-edit
          git push origin upstream-sync

      - name: Create Pull Request to dev
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:upstream-sync`,
              base: 'dev',
              state: 'open'
            });
            if (prs.length > 0) {
              console.log(`PR already exists: #${prs[0].number}`);
              // Update existing PR body
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
                body: `## đź”„ Upstream sync\n\nNew changes from the original repository [murraco/jekyll-theme-minimal-resume](https://github.com/murraco/jekyll-theme-minimal-resume).\n\n### Changelog\n\`\`\`\n${process.env.CHANGELOG}\n\`\`\`\n\n> âš ď¸Ź Review for conflicts before merging. Upstream may overwrite your customizations in _config.yml, _includes/ etc.`
              });
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'đź”„ Upstream sync: updates from original repository',
              head: 'upstream-sync',
              base: 'dev',
              body: `## đź”„ Upstream sync\n\nNew changes from the original repository [murraco/jekyll-theme-minimal-resume](https://github.com/murraco/jekyll-theme-minimal-resume).\n\n### Changelog\n\`\`\`\n${process.env.CHANGELOG}\n\`\`\`\n\n> âš ď¸Ź Review for conflicts before merging. Upstream may overwrite your customizations in _config.yml, _includes/ etc.`
            });
            console.log(`Created PR #${pr.number}`);
          env:
            CHANGELOG: ${{ steps.check.outputs.changelog }}

      - name: Create notification issue
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'đź”” Upstream sync: new updates detected',
              body: `New changes detected in the upstream repository!\n\n### New commits:\n\`\`\`\n${process.env.CHANGELOG}\n\`\`\`\n\nA PR has been automatically created from \`upstream-sync\` to \`dev\`.\nReview the PR and decide whether to merge.\n\n---\n*This notification was automatically generated by GitHub Actions.*`,
              labels: ['upstream-sync']
            });
