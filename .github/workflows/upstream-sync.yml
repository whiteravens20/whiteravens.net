name: Sync Upstream

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: upstream-sync
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/murraco/jekyll-theme-minimal-resume.git
          git fetch upstream master

      - name: Check for new upstream changes
        id: check
        run: |
          CHANGES=$(git log --oneline HEAD..upstream/master)
          if [ -z "$CHANGES" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new upstream changes."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New upstream commits:"
            echo "$CHANGES"
            {
              echo 'changelog<<EOF'
              echo "$CHANGES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Merge upstream into upstream-sync
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git merge upstream/master --no-edit
          git push origin upstream-sync

      - name: Create Pull Request to dev
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          CHANGELOG: ${{ steps.check.outputs.changelog }}
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:upstream-sync`,
              base: 'dev',
              state: 'open'
            });
            const body = `## 🔄 Upstream sync\n\nNew changes from the original repository [murraco/jekyll-theme-minimal-resume](https://github.com/murraco/jekyll-theme-minimal-resume).\n\n### Changelog\n\`\`\`\n${process.env.CHANGELOG}\n\`\`\`\n\n> ⚠️ Review for conflicts before merging. Upstream may overwrite your customizations in _config.yml, _includes/ etc.`;
            if (prs.length > 0) {
              console.log(`PR already exists: #${prs[0].number}`);
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
                body: body
              });
              return;
            }
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔄 Upstream sync: updates from original repository',
              head: 'upstream-sync',
              base: 'dev',
              body: body
            });
            console.log(`Created PR #${pr.number}`);

      - name: Update or create notification issue
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          CHANGELOG: ${{ steps.check.outputs.changelog }}
        with:
          script: |
            const title = '🔔 Upstream sync: new updates detected';
            const body = `New changes detected in the upstream repository!\n\n_Last updated: ${new Date().toISOString()}_\n\n### New commits:\n\`\`\`\n${process.env.CHANGELOG}\n\`\`\`\n\nA PR has been automatically created/updated from \`upstream-sync\` to \`dev\`.\nReview the PR and decide whether to merge.\n\n---\n*This notification was automatically generated by GitHub Actions.*`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });
            const existing = issues.find(i => !i.pull_request);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
              console.log(`Updated issue #${existing.number}`);
              return;
            }
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['upstream-sync']
            });
            console.log(`Created issue #${issue.number}`);
