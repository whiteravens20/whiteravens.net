name: Security

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly on Monday at 09:00 UTC
    - cron: '0 9 * * 1'

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Everything here is a build-time dependency (the site ships static
      # files), so a single high bar keeps the signal useful.
      - name: Audit dependencies
        run: npm audit --audit-level=high

      # Verify every installed tarball has a valid registry signature.
      # Requires a fresh install since `audit signatures` reads node_modules.
      - name: Install (for signature audit)
        run: npm ci --ignore-scripts

      - name: Verify signatures
        run: npm audit signatures

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares new deps against known vulnerabilities
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high
