# ── Dependabot configuration ──────────────────────────────────────────────────
# Keeps GitHub Actions and npm dependencies up to date automatically.
# Opens PRs weekly against `dev` — CI must pass before merging.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"

  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: UTC
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
    # Group all non-breaking updates into a single PR to reduce noise.
    # Security updates are always opened as separate PRs regardless.
    groups:
      non-breaking:
        update-types:
          - minor
          - patch
